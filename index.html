<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UNRC · Navegación por Semestres y Materias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1410; font-family: system-ui, sans-serif; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #f5f0e8;
            border-top: 5px solid #c4440a;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 { font-size: 2rem; color: #0f0e0b; }
        .header h1 span { color: #c4440a; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f0ead8;
            padding: 1rem;
            text-align: center;
            border: 1px solid #d8cfc0;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #c4440a; }
        .semester-card {
            background: #f5f0e8;
            border: 1px solid #d8cfc0;
            margin-bottom: 1rem;
        }
        .semester-header {
            background: #f0ead8;
            padding: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .semester-content { padding: 1rem; display: none; }
        .semester-card.open .semester-content { display: block; }
        .materia-card {
            background: #fff;
            border: 1px solid #d8cfc0;
            margin-bottom: 0.5rem;
        }
        .materia-header {
            background: #faf7ee;
            padding: 0.7rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .materia-content { padding: 0.8rem; display: none; border-top: 1px solid #d8cfc0; }
        .materia-card.open .materia-content { display: block; }
        .modulos { display: flex; flex-direction: column; gap: 1rem; }
        .modulo {
            border-left: 3px solid #c4440a;
            padding-left: 1rem;
        }
        .modulo h4 { color: #c4440a; margin-bottom: 0.5rem; }
        .actividades { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .actividad {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: #f0ead8;
            text-decoration: none;
            color: #0f0e0b;
            border: 1px solid #d8cfc0;
            font-size: 0.8rem;
        }
        .actividad:hover { background: #f0d4c4; }
        .footer {
            margin-top: 2rem;
            background: #0f0e0b;
            padding: 1rem;
            text-align: center;
            color: #f5f0e8;
        }
        .toggle-icon { font-size: 0.8rem; color: #6b6455; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Relaciones <span>Internacionales</span></h1>
        <p>Universidad Rosario Castellanos · Isaac Moctezuma Calderón</p>
    </div>
    <div class="stats" id="stats"></div>
    <div id="semesters"></div>
    <div class="footer">LRIN · UNRC · Navegación completa por actividades</div>
</div>

<script>
const semestresData = {};

async function cargarDatos() {
    for (let s = 1; s <= 8; s++) {
        try {
            const res = await fetch(`semestre_${s}/`);
            const text = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const links = doc.querySelectorAll('a');
            const materias = [];
            
            for (const link of links) {
                let href = link.getAttribute('href');
                if (href && href.match(/^\d+_/) && href.endsWith('/')) {
                    const nombre = href.replace(/_/g, ' ').replace(/^\d+ /, '');
                    const path = `semestre_${s}/${href}`;
                    
                    const archivos = {
                        m1_foro: null, m2_tarea: null, m2_foro: null,
                        m3_tarea: null, m3_foro: null, m4_tarea: null,
                        m4_foro: null, m5_integradora: null
                    };
                    
                    const checks = await Promise.all(Object.keys(archivos).map(async k => {
                        const url = `${path}${k}.html`;
                        try {
                            const resp = await fetch(url, { method: 'HEAD' });
                            return { key: k, exists: resp.ok };
                        } catch(e) { return { key: k, exists: false }; }
                    }));
                    checks.forEach(c => { if(c.exists) archivos[c.key] = `${c.key}.html`; });
                    
                    materias.push({ nombre, path, archivos });
                }
            }
            if(materias.length) semestresData[s] = { nombre: `Semestre ${s}`, materias };
        } catch(e) { console.log('Error cargando semestre', s); }
    }
    renderizar();
}

function renderizar() {
    let totalMaterias = 0;
    Object.values(semestresData).forEach(s => totalMaterias += s.materias.length);
    
    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-number">${Object.keys(semestresData).length}</div><div class="stat-label">Semestres</div></div>
        <div class="stat-card"><div class="stat-number">${totalMaterias}</div><div class="stat-label">Materias</div></div>
    `;
    
    const container = document.getElementById('semesters');
    container.innerHTML = '';
    
    for(const [num, sem] of Object.entries(semestresData)) {
        const card = document.createElement('div');
        card.className = 'semester-card';
        card.innerHTML = `
            <div class="semester-header" onclick="this.parentElement.classList.toggle('open')">
                <span>📚 ${sem.nombre}</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="semester-content">
                ${sem.materias.map(m => `
                    <div class="materia-card">
                        <div class="materia-header" onclick="event.stopPropagation(); this.parentElement.classList.toggle('open')">
                            <span>📖 ${m.nombre}</span>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div class="materia-content">
                            <div class="modulos">
                                <div class="modulo">
                                    <h4>📘 Módulo 1 · Fundamentos</h4>
                                    <div class="actividades">
                                        ${m.archivos.m1_foro ? `<a href="${m.path}${m.archivos.m1_foro}" class="actividad">💬 Foro integrador</a>` : '<span class="actividad" style="opacity:0.5">💬 Próximamente</span>'}
                                    </div>
                                </div>
                                <div class="modulo">
                                    <h4>📗 Módulo 2 · Análisis y aplicación</h4>
                                    <div class="actividades">
                                        ${m.archivos.m2_tarea ? `<a href="${m.path}${m.archivos.m2_tarea}" class="actividad">📝 Tarea auténtica</a>` : '<span class="actividad" style="opacity:0.5">📝 Próximamente</span>'}
                                        ${m.archivos.m2_foro ? `<a href="${m.path}${m.archivos.m2_foro}" class="actividad">💬 Foro integrador</a>` : '<span class="actividad" style="opacity:0.5">💬 Próximamente</span>'}
                                    </div>
                                </div>
                                <div class="modulo">
                                    <h4>📙 Módulo 3 · Profundización y debate</h4>
                                    <div class="actividades">
                                        ${m.archivos.m3_tarea ? `<a href="${m.path}${m.archivos.m3_tarea}" class="actividad">📝 Tarea auténtica</a>` : '<span class="actividad" style="opacity:0.5">📝 Próximamente</span>'}
                                        ${m.archivos.m3_foro ? `<a href="${m.path}${m.archivos.m3_foro}" class="actividad">💬 Foro integrador</a>` : '<span class="actividad" style="opacity:0.5">💬 Próximamente</span>'}
                                    </div>
                                </div>
                                <div class="modulo">
                                    <h4>📕 Módulo 4 · Integración y propuesta</h4>
                                    <div class="actividades">
                                        ${m.archivos.m4_tarea ? `<a href="${m.path}${m.archivos.m4_tarea}" class="actividad">📝 Tarea auténtica</a>` : '<span class="actividad" style="opacity:0.5">📝 Próximamente</span>'}
                                        ${m.archivos.m4_foro ? `<a href="${m.path}${m.archivos.m4_foro}" class="actividad">💬 Foro integrador</a>` : '<span class="actividad" style="opacity:0.5">💬 Próximamente</span>'}
                                    </div>
                                </div>
                                <div class="modulo">
                                    <h4>🎯 Módulo 5 · Actividad integradora</h4>
                                    <div class="actividades">
                                        ${m.archivos.m5_integradora ? `<a href="${m.path}${m.archivos.m5_integradora}" class="actividad">📝 Síntesis final</a>` : '<span class="actividad" style="opacity:0.5">🎯 Próximamente</span>'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(card);
    }
}

cargarDatos();
</script>
</body>
</html>
