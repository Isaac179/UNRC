<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UNRC · Navegación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1410;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #f5f0e8;
            border-top: 5px solid #c4440a;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 { font-size: 2rem; color: #0f0e0b; }
        .header h1 span { color: #c4440a; }
        .header p { color: #6b6455; margin-top: 0.5rem; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f0ead8;
            padding: 1rem;
            text-align: center;
            border: 1px solid #d8cfc0;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #c4440a; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #6b6455; }
        .semesters-grid { display: flex; flex-direction: column; gap: 1rem; }
        .semester-card { background: #f5f0e8; border: 1px solid #d8cfc0; }
        .semester-header {
            background: #f0ead8;
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .semester-content { padding: 1rem; display: block; }
        .semester-card.collapsed .semester-content { display: none; }
        .materias-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .materia-item { background: #f5f0e8; border: 1px solid #d8cfc0; }
        .materia-header {
            padding: 0.7rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: #faf7ee;
        }
        .materia-content { padding: 0.8rem; border-top: 1px solid #d8cfc0; display: block; }
        .materia-item.collapsed .materia-content { display: none; }
        .actividades { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.5rem 0; }
        .actividad {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: #f0ead8;
            font-size: 0.7rem;
            text-decoration: none;
            color: #0f0e0b;
            border: 1px solid #d8cfc0;
        }
        .actividad:hover { background: #f0d4c4; }
        .actividad.missing { background: #e0d8cc; color: #6b6455; cursor: default; }
        .badge { background: #3d5a47; color: white; font-size: 0.55rem; padding: 0.1rem 0.3rem; margin-left: 0.3rem; }
        .ver-mas { margin-top: 0.5rem; text-align: right; }
        .ver-mas a { font-size: 0.7rem; color: #c4440a; }
        .footer { margin-top: 2rem; background: #0f0e0b; padding: 1rem; text-align: center; color: #f5f0e8; font-size: 0.7rem; }
        .toggle-icon { font-size: 0.8rem; color: #6b6455; }
        .collapsed .toggle-icon { transform: rotate(-90deg); display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Relaciones <span>Internacionales</span></h1>
        <p>Universidad Rosario Castellanos · Isaac Moctezuma Calderón</p>
    </div>
    <div class="semesters-grid" id="semestersGrid"></div>
    <div class="footer">LRIN · UNRC · 2026</div>
</div>
<script>
const semestres = {
    1: { nombre: "Semestre 1", materias: [] },
    2: { nombre: "Semestre 2", materias: [] },
    3: { nombre: "Semestre 3", materias: [] },
    4: { nombre: "Semestre 4", materias: [] },
    5: { nombre: "Semestre 5", materias: [] },
    6: { nombre: "Semestre 6", materias: [] },
    7: { nombre: "Semestre 7", materias: [] },
    8: { nombre: "Semestre 8", materias: [] }
};

// Escanear materias desde el servidor (simplificado)
async function cargarMaterias() {
    for (let s = 1; s <= 8; s++) {
        try {
            const response = await fetch(`semestre_${s}/`);
            const text = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const links = doc.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.match(/^\d+_/) && href.endsWith('/')) {
                    const nombre = href.replace(/_/g, ' ').replace(/^\d+ /, '');
                    semestres[s].materias.push({ nombre: nombre, path: `semestre_${s}/${href}` });
                }
            });
        } catch(e) { console.log("Error cargando semestre", s); }
    }
    renderSemesters();
}

function renderSemesters() {
    const grid = document.getElementById('semestersGrid');
    grid.innerHTML = '';
    for (const [num, sem] of Object.entries(semestres)) {
        const card = document.createElement('div');
        card.className = 'semester-card collapsed';
        card.innerHTML = `
            <div class="semester-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span>📚 ${sem.nombre}</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="semester-content">
                <div class="materias-list">
                    ${sem.materias.map(m => `
                        <div class="materia-item collapsed">
                            <div class="materia-header" onclick="event.stopPropagation(); this.parentElement.classList.toggle('collapsed')">
                                <span>📖 ${m.nombre}</span>
                                <span class="toggle-icon">▼</span>
                            </div>
                            <div class="materia-content">
                                <div class="actividades">
                                    <a href="${m.path}" class="actividad">🔗 Ver actividades</a>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    ${sem.materias.length === 0 ? '<div class="materia-item"><div class="materia-header">✨ Próximamente</div></div>' : ''}
                </div>
            </div>
        `;
        grid.appendChild(card);
    }
}

cargarMaterias();
</script>
</body>
</html>
