        ]
    }
};

function generarMenu() {
    const container = document.getElementById('menuSemestres');
    let html = '';
    
    for (let s = 1; s <= 8; s++) {
        const materias = materiasPorSemestre[s];
        if (!materias) continue;
        
        html += `<div class="menu-dropdown">
            <button class="menu-dropbtn">📚 Semestre ${s}</button>
            <div class="menu-dropdown-content">`;
        
        for (const materia of materias) {
            const pathMateria = `semestre_${s}/${materia.path}`;
            const actividades = actividadesPorMateria[materia.path] || null;
            
            if (actividades && actividades.actividades) {
                // Materia con submenú de actividades
                html += `<div class="submenu">
                    <a href="${pathMateria}/index.html">📖 ${materia.nombre}</a>
                    <div class="submenu-content">`;
                
                for (const act of actividades.actividades) {
                    let emoji = act.tipo === 'foro' ? '💬' : (act.tipo === 'tarea' ? '📝' : '🎯');
                    html += `<a href="${pathMateria}/${act.archivo}">
                        ${emoji} <span class="modulo-badge">M${act.modulo}</span> ${act.nombre}
                    </a>`;
                }
                
                html += `</div></div>`;
            } else {
                // Materia sin actividades específicas
                html += `<a href="${pathMateria}/index.html" style="display:block; padding:10px 20px; color:white; text-decoration:none;">📖 ${materia.nombre}</a>`;
            }
        }
        
        html += `</div></div>`;
    }
    
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', generarMenu);
